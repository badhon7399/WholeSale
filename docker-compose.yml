version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: wholesale_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - wholesale_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wholesale_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/wholesale
      - JWT_SECRET=change-this-in-production-use-a-strong-key
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - wholesale_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wholesale_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - wholesale_network

networks:
  wholesale_network:
    driver: bridge

volumes:
  mongodb_data:
